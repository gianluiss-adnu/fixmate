{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'booking/booking.css' %}">
    <title>Fixmate</title>
</head>
<body>
<div class="booking-container">

    <!-- BOOKING FORM -->
    <form class="booking-form" method="POST" action="{% url 'create_booking' %}">
        {% csrf_token %}

        <h1>Book a Service</h1>

        <!-- SERVICE SELECT -->
        <div class="card">
            <h3>Select Service</h3>

            <select name="service" required>
                {% for service in services %}
                    <option value="{{ service.id }}">
                        {{ service.name }} - ₱{{ service.price }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- DATE -->
        <div class="card">
            <label for="date">Select Date</label>
            <input type="date" id="date" name="scheduled_date" required>
        </div>

        <!-- TIME -->
        <div class="card">
            <label>Select Time Slot</label>

            <div class="time-slots">
                <label><input type="radio" name="scheduled_time" value="09:00"> 9:00 AM</label>
                <label><input type="radio" name="scheduled_time" value="13:00"> 1:00 PM</label>
                <label><input type="radio" name="scheduled_time" value="16:00"> 4:00 PM</label>
            </div>
        </div>

        <!-- ADDRESS -->
        <div class="card">
            <label for="address">Service Address</label>

            <select name="address" required>
                {% for address in addresses %}
                    <option value="{{ address.id }}">
                        {{ address.street }}, {{ address.city }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- NOTES -->
        <div class="card">
            <label for="notes">Additional Notes</label>
            <textarea name="notes" rows="4" placeholder="Describe the issue..."></textarea>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="confirm-btn">
            Confirm Booking
        </button>

    </form>

    <!-- SUMMARY PANEL (still frontend only) -->
    <div class="booking-summary">

        <h2>Summary</h2>

        <div class="summary-box">
            <p><strong>Service:</strong> Select above</p>
            <p><strong>Date:</strong> --</p>
            <p><strong>Time:</strong> --</p>
            <p><strong>Address:</strong> --</p>
        </div>

        <div class="price-box">
            <h3>Total</h3>
            <p>Varies per service</p>
        </div>

    </div>

</div>
</body>
</html>
