{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'booking/booking.css' %}">
    <title>Fixmate</title>
</head>
<body>
<div class="booking-container">

    <!-- BOOKING FORM -->
    <form class="booking-form" method="POST">

        {% csrf_token %}

        <h1>Book a Handyman</h1>

        <!-- SERVICE INFO (display only) -->
        <div class="card">
            <h3>Service Details</h3>
            <p><strong>Service:</strong> Plumbing Repair</p>
            <p><strong>Handyman:</strong> Juan Dela Cruz</p>
            <p><strong>Rate:</strong> ₱500</p>
        </div>

        <!-- DATE -->
        <div class="card">
            <label for="date">Select Date</label>
            <input type="date" id="date" name="date" required>
        </div>

        <!-- TIME -->
        <div class="card">
            <label>Select Time Slot</label>

            <div class="time-slots">
                <label>
                    <input type="radio" name="time" value="09:00">
                    9:00 AM
                </label>

                <label>
                    <input type="radio" name="time" value="11:00">
                    11:00 AM
                </label>

                <label>
                    <input type="radio" name="time" value="13:00">
                    1:00 PM
                </label>

                <label>
                    <input type="radio" name="time" value="15:00">
                    3:00 PM
                </label>
            </div>
        </div>

        <!-- ADDRESS -->
        <div class="card">
            <label for="address">Service Address</label>
            <input type="text" id="address" name="address" placeholder="Enter your address" required>
        </div>

        <!-- NOTES -->
        <div class="card">
            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Describe the issue..."></textarea>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="confirm-btn">
            Confirm Booking
        </button>

    </form>

    <!-- SUMMARY PANEL (frontend only for now) -->
    <div class="booking-summary">

        <h2>Summary</h2>

        <div class="summary-box">
            <p><strong>Service:</strong> Plumbing Repair</p>
            <p><strong>Date:</strong> --</p>
            <p><strong>Time:</strong> --</p>
            <p><strong>Address:</strong> --</p>
        </div>

        <div class="price-box">
            <h3>Total</h3>
            <p>₱500 (estimated)</p>
        </div>

    </div>
</div>
</body>
</html>
