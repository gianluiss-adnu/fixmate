{% extends "accounts/auth_base.html" %}

{% block content %}
<h2>Log In</h2>

<form method="POST">
    {% csrf_token %}

    <div class="fields-login">
        <div class="field">
            <label>Email</label>
            <input type="text" name="first_name">
        </div>
    
        <div class="field">
            <label>Password</label>
            <input type="password" name="password">
        </div>
    </div>
    <!-- FOR PREFINALS WILL CHANGE AFTER -->
    <!-- <button type="submit">Log in</button> -->
    <a href="/services/" class="btn">Log in</a>
</form>



<div class="auth-links">
    <p>
        Create account?
        <a href="/accounts/register/">Sign up</a>
    </p>
</div>
{% endblock %}
